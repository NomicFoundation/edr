packages:
  - "crates/edr_napi"
  - "hardhat-tests"
  - "hardhat-tests/integration/*"
  - "js/benchmark"
  - "js/helpers"
  - "js/integration-tests/*"

overrides:
  hardhat>@nomicfoundation/edr: "workspace:*"

patchedDependencies:
  hardhat@2.28.4: patches/hardhat@2.28.4.patch
  hardhat@3.4.5: patches/hardhat@3.4.5.patch

# Delay installs until a version is at least 1 week old
minimumReleaseAge: 10080

# Allow immediate installs for the following packages
minimumReleaseAgeExclude:
  - "@nomicfoundation/*"
  - "hardhat"

# We run with ignore-scripts=true; none of these need to build.
allowBuilds:
  esbuild: false
  keccak: false
  secp256k1: false
