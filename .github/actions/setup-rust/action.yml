name: Setup Rust
description: |
  Install the Rust toolchain. Caching is handled separately via the
  `cache-rust-deps` and `cache-rust-target` composite actions —
  this composite always passes `cache: false` to the underlying
  setup-rust-toolchain action so its bundled Swatinem doesn't run.

inputs:
  toolchain:
    description: The Rust toolchain to use
    required: false
  components:
    description: Comma-separated list of components to install
    required: false

runs:
  using: composite
  steps:
    - name: Install Rust
      uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0
      with:
        # Empty string means rust-toolchain if it exists, otherwise stable
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}
        # Caching handled by ./.github/actions/cache-rust-{deps,target}.
        cache: false
        # Do not override the RUSTFLAGS by default and instead do that per job,
        # if needed. Setting RUSTFLAGS via env var, config, etc. is mutually
        # exclusive and often a source of bugs.
        # Empty string here means no override.
        rustflags: ""
        # By default, we do not override the toolchain from rust-toolchain.
        # The user needs to explicitly use `<cmd> +<toolchain>` for clarity.
        override: false

    # Append platform target features to RUSTFLAGS so they survive any env
    # RUSTFLAGS the job (or cargo-llvm-cov, etc.) sets. Cargo's resolution
    # rule is "first source wins, no merging" — env RUSTFLAGS clobbers the
    # `target.<triple>.rustflags` from .cargo/config.toml wholesale, so the
    # only reliable way to preserve `+crt-static` on Windows test builds
    # (matching the released NAPI ABI) is to bake it into the env value
    # itself before any later step appends instrumentation flags.
    - name: Augment RUSTFLAGS with platform target features
      shell: bash
      run: |
        case "$RUNNER_OS" in
          Windows)
            echo "RUSTFLAGS=${RUSTFLAGS:-} -C target-feature=+crt-static" >> "$GITHUB_ENV"
            ;;
          *) ;;
        esac
