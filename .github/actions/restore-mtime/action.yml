name: restore-mtime
description: |
  Restore each file's mtime to its last commit time.

  GHA checkouts stamp every file's mtime to "now", which makes cargo
  treat every workspace source as newer than the cached `target/`
  artifacts and rebuild the world on warm-cache runs. Restoring
  mtimes from git lets cargo's freshness checks behave as if the
  workspace were unchanged since the cache was written.

  Requires `fetch-depth: 0` on the preceding `actions/checkout`.

runs:
  using: composite
  steps:
    - name: Restore file mtimes from git
      uses: chetan/git-restore-mtime-action@d186aca54f8760da4dec55313195e51ed3ebb0b3 # v2.3
      with:
        args: "--commit-time"
