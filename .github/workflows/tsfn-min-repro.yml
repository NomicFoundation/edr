# Isolation experiment for the napi v3 `Check failed: node->IsInUse()` teardown
# crash (see edr-napi-tsfn-teardown-race-followup.md). Builds the *standalone*
# tsfn-min-repro addon (bare napi-rs v3, no EDR code) and loops a trivial node
# driver at process exit on the native arm64 runner.
#
# A bare weak TSFN is 0/500. This matrix grows the addon toward EDR ~2 variables
# at a time (ObjectWrap Reference, a *called* TSFN, a tokio runtime, off-thread
# finalize) to find which combination crashes. Search platform is musl (where
# EDR reproduces); add gnu once a mode hits, to symbolize the frame.
#
# NOT merge-required. Job SUCCEEDS even on crashes — crashes are the signal.
name: TSFN minimal repro

on:
  push:
    branches:
      - "bas/diag-tsfn-*"
      - "bas/tsfn-*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tsfn-min-repro-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repro:
    name: min-repro node@${{ matrix.node }} ${{ matrix.mode }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        node: ["24", "26"]
        mode:
          - control
          - objectwrap
          - objectwrap-tsfn
          - objectwrap-offthread
          - called-tsfn
          - runtime-called-tsfn
        include:
          - node: "24"
            image: node:24-alpine3.20
          - node: "26"
            image: node:26-alpine
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Enable core dumps on host
        run: |
          sudo sysctl -w kernel.core_pattern='core.%p'
          echo "core_pattern=$(cat /proc/sys/kernel/core_pattern)"

      - name: Build standalone addon + loop driver (musl)
        uses: NomicFoundation/docker-run-action@63f044457cfb71a5c63fa589218c89a418565d9c # Fork of v3 with updated Docker
        env:
          MODE: ${{ matrix.mode }}
          ITER: "500"
        with:
          image: ${{ matrix.image }}
          options: "--user 0:0 --ulimit core=-1 -e MODE -e ITER -v ${{ github.workspace }}:/build -w /build/tsfn-min-repro"
          run: |
            set -e
            apk add --no-cache build-base python3 git curl bash gdb
            ln -sf /usr/bin/gcc /usr/bin/aarch64-linux-musl-gcc
            curl -fsSL https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
            export PATH="/root/.cargo/bin:$PATH"
            export CARGO_NET_RETRY=10
            export CARGO_HTTP_MULTIPLEXING=false

            # Debug symbols (dev profile), then load the cdylib as a .node.
            cargo build
            cp target/debug/libtsfn_min_repro.so tsfn_min_repro.node
            node -e "console.log('exports:', Object.keys(require('./tsfn_min_repro.node')))"

            ulimit -c unlimited || true
            crashes=0
            echo "=== [$MODE] running driver x${ITER} ==="
            for i in $(seq 1 "$ITER"); do
              rm -f core.* 2>/dev/null || true
              set +e
              node test.js "$MODE" > "run.$i.log" 2>&1
              code=$?
              set -e
              if [ "$code" -ne 0 ]; then
                crashes=$((crashes + 1))
                echo "::group::[$MODE] iteration $i FAILED exit=$code (signal ~$((code - 128)))"
                cat "run.$i.log" || true
                core=$(ls -t core.* 2>/dev/null | head -1 || true)
                if [ -n "$core" ]; then
                  echo "--- gdb 'thread apply all bt full' from $core ---"
                  gdb -batch -ex 'thread apply all bt full' -ex quit /usr/local/bin/node "$core" 2>&1 | head -n 200
                fi
                echo "::endgroup::"
              fi
            done
            echo "================================================"
            echo "[$MODE] node@${{ matrix.node }} MIN-REPRO CRASH RATE: ${crashes} / ${ITER}"
            echo "================================================"
