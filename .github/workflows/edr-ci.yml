name: EDR

on:
  merge_group:
    types: [checks_requested]
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

jobs:
  check-edr-safety:
    name: Check EDR dependencies safety (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # disable for "windows-2025" due to error: Path Validation Error:
      # Path(s) specified in the action for caching do(es) not exist,
      # hence no cache is being saved.
      # https://github.com/NomicFoundation/edr/issues/1199
      matrix:
        os: ["ubuntu-24.04", "macos-15"]
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          persist-credentials: false
      - uses: socketdev/action@4337a545deecc20f19a909e52db7a2f6ba292f42 # v1
        with:
          mode: firewall
      - uses: ./.github/actions/setup-rust
      - uses: ./.github/actions/setup-node

      - name: Pnpm safety
        run: sfw pnpm install --frozen-lockfile --prefer-offline

  check-edr:
    name: Check EDR
    runs-on: ubuntu-24.04
    needs: check-edr-safety
    env:
      RUSTFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          persist-credentials: false
          fetch-depth: 0 # full history needed by ./.github/actions/restore-mtime
      - uses: ./.github/actions/restore-mtime
      - uses: ./.github/actions/setup-rust
      - uses: ./.github/actions/cache-rust-deps/restore
      - uses: ./.github/actions/cache-rust-target/restore
        with:
          bucket: workspace-strict

      - name: Cargo check no default features for all crates
        run: cargo check --workspace --all-targets --no-default-features --locked

      - uses: ./.github/actions/cache-rust-deps/save
        if: always()
      - uses: ./.github/actions/cache-rust-target/save
        if: always()
        with:
          bucket: workspace-strict

  cargo-hack-edr:
    name: cargo-hack check EDR
    runs-on: ubuntu-24.04
    needs: check-edr
    permissions:
      contents: read
    env:
      RUSTFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          persist-credentials: false
          fetch-depth: 0 # full history needed by ./.github/actions/restore-mtime
      - uses: ./.github/actions/restore-mtime

      - uses: ./.github/actions/setup-rust
      - uses: ./.github/actions/cache-rust-deps/restore
      - uses: ./.github/actions/cache-rust-target/restore
        with:
          bucket: workspace-strict

      # Install pre-built binaries for cargo hack
      - uses: taiki-e/install-action@8cd2ac21dc357ca7dd807fe294d11e9ef84f60ec # v2.62.53
        with:
          tool: cargo-hack@0.6.39

      - name: Cargo hack check for EDR crates
        run: |
          chmod +x ./.github/scripts/cargo-hack-edr.sh
          ./.github/scripts/cargo-hack-edr.sh
        shell: bash

      - uses: ./.github/actions/cache-rust-deps/save
        if: always()
      - uses: ./.github/actions/cache-rust-target/save
        if: always()
        with:
          bucket: workspace-strict

  test-edr-rs:
    name: Test EDR (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: check-edr
    # Strict warning gate on test/cfg(test) compiles. The setup-rust
    # composite action appends `-C target-feature=+crt-static` on
    # Windows so this env value doesn't clobber the CRT-static linkage
    # that matches the released NAPI artifact.
    env:
      RUSTFLAGS: -Dwarnings
      RUSTDOCFLAGS: -Dwarnings
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-24.04", "macos-15", "windows-2025"]
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          persist-credentials: false
          fetch-depth: 0 # full history needed by ./.github/actions/restore-mtime
      - uses: ./.github/actions/restore-mtime

      - uses: ./.github/actions/setup-rust
        with:
          components: llvm-tools-preview
      - uses: ./.github/actions/cache-rust-deps/restore
      - uses: ./.github/actions/cache-rust-target/restore
        with:
          bucket: workspace-coverage

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@8cd2ac21dc357ca7dd807fe294d11e9ef84f60ec # v2.62.53
        with:
          tool: cargo-llvm-cov@0.8.5

      - name: Restore EDR RPC cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            **/edr-cache
          key: edr-rs-rpc-cache-v1-${{ matrix.os }}
          # Save key includes a hashFiles suffix; restore via the
          # OS-scoped prefix to pick up the most recent matching entry.
          restore-keys: |
            edr-rs-rpc-cache-v1-${{ matrix.os }}-

      - name: Run cargo tests (with coverage)
        env:
          ALCHEMY_URL: ${{ secrets.ALCHEMY_URL }}
        run: cargo llvm-cov --workspace --all-targets --all-features --locked --no-fail-fast --codecov --output-path codecov.json

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@5a1091511ad55cbe89839c7260b706298ca349f7 # v5.5.1
        with:
          files: codecov.json
          name: ${{ matrix.os }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Doctests
        # Was previously `--features tracing` only; broaden to --all-features
        # to match the main test compile and reuse fingerprints. Revert if
        # this surfaces real doctest breakage.
        # edr_napi sets `doctest = false` in its Cargo.toml so it's silently
        # skipped here without needing `--exclude`, which would shrink the
        # feature unification universe and invalidate sibling-crate caches.
        # The "cdylib doc tests not supported" warning still fires anyway: rust-lang/cargo#15964.
        run: cargo test --doc --workspace --all-features --locked --no-fail-fast

      - name: Save EDR RPC cache
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            **/edr-cache
          key: edr-rs-rpc-cache-v1-${{ matrix.os }}-${{ hashFiles('**/edr-cache/**/*') }}

      - uses: ./.github/actions/cache-rust-deps/save
        if: always()
      - uses: ./.github/actions/cache-rust-target/save
        if: always()
        with:
          bucket: workspace-coverage

      # disable until:
      # 1) https://github.com/napi-rs/napi-rs/issues/1405 is resolved (Windows-only)
      # 2) https://github.com/nextest-rs/nextest/issues/871 (all platforms)
      # when re-enabled, remove "Run cargo test"

      # Nextest
      # - name: Install latest nextest release
      #   uses: taiki-e/install-action@nextest

      # - name: Test with latest nextest release
      #   env:
      #     CARGO_INCREMENTAL: ${{ matrix.CARGO_INCREMENTAL }}
      #     ALCHEMY_URL: ${{ secrets.ALCHEMY_URL }}
      #   run: cargo nextest run --workspace --all-features --all-targets

  test-edr-ts:
    name: Test EDR TS bindings (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: check-edr
    # See comment on test-edr-rs above re crt-static handling.
    env:
      RUSTFLAGS: -Dwarnings
      RUSTDOCFLAGS: -Dwarnings
    strategy:
      fail-fast: false
      matrix:
        node: [20]
        os: [ubuntu-24.04, macos-15, windows-2025]
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          persist-credentials: false
          fetch-depth: 0 # full history needed by ./.github/actions/restore-mtime
      - uses: ./.github/actions/restore-mtime

      - uses: ./.github/actions/setup-node
        with:
          node-version: ${{ matrix.node }}

      - uses: ./.github/actions/setup-rust
        with:
          components: llvm-tools-preview
      - uses: ./.github/actions/cache-rust-deps/restore
      - uses: ./.github/actions/cache-rust-target/restore
        with:
          bucket: napi-coverage

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@8cd2ac21dc357ca7dd807fe294d11e9ef84f60ec # v2.62.53
        with:
          tool: cargo-llvm-cov@0.8.5

      - name: Restore EDR RPC cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            **/edr-cache
          key: edr-ts-rpc-cache-v1-${{ matrix.os }}
          # Save key includes a hashFiles suffix; restore via the
          # OS-scoped prefix to pick up the most recent matching entry.
          restore-keys: |
            edr-ts-rpc-cache-v1-${{ matrix.os }}-

      - name: Install package
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Run tests
        env:
          ALCHEMY_URL: ${{ secrets.ALCHEMY_URL }}
          # Enables chalk colors in CI, required for logs tests
          FORCE_COLOR: 3
        shell: bash
        run: |
          source <(cargo llvm-cov show-env --sh)
          # napi-rs's `napi build` only re-emits index.js / index.d.ts when
          # cargo actually compiles (proc-macros write the intermediate
          # type-def file as a side effect). On a warm cache, cargo can say
          # "fresh" in <1s and skip emitting, leaving the committed
          # production-feature bindings in place — which lack symbols gated
          # behind `test-mock` (e.g. MockTime). Force a real rebuild so the
          # bindings match the feature set we test against.
          # Tracked upstream: napi-rs/napi-rs#1276, fix in #3124.
          cargo clean -p edr_napi
          pnpm -C crates/edr_napi test
          # `--release` included to match `build:dev` compilation flags
          cargo llvm-cov report --release --locked --codecov --output-path codecov.json

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@5a1091511ad55cbe89839c7260b706298ca349f7 # v5.5.1
        with:
          files: codecov.json
          name: ${{ matrix.os }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Save EDR RPC cache
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            **/edr-cache
          key: edr-ts-rpc-cache-v1-${{ matrix.os }}-${{ hashFiles('**/edr-cache/**/*') }}

      - uses: ./.github/actions/cache-rust-deps/save
        if: always()
      - uses: ./.github/actions/cache-rust-target/save
        if: always()
        with:
          bucket: napi-coverage

  edr-style:
    name: Check EDR Style
    runs-on: ubuntu-24.04
    needs: check-edr
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          persist-credentials: false
          fetch-depth: 0 # full history needed by ./.github/actions/restore-mtime
      - uses: ./.github/actions/restore-mtime

      - uses: ./.github/actions/setup-rust
        with:
          components: clippy

      - name: Install nightly rustfmt
        uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly
          components: rustfmt

      - uses: ./.github/actions/cache-rust-deps/restore
      - uses: ./.github/actions/cache-rust-target/restore
        with:
          bucket: workspace-dev

      - name: Run cargo fmt
        run: cargo +nightly fmt --all --check

      - name: Run cargo clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - uses: ./.github/actions/cache-rust-deps/save
        if: always()
      - uses: ./.github/actions/cache-rust-target/save
        if: always()
        with:
          bucket: workspace-dev

  edr-docs:
    name: Build EDR Docs
    runs-on: ubuntu-24.04
    needs: check-edr
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          persist-credentials: false
          fetch-depth: 0 # full history needed by ./.github/actions/restore-mtime
      - uses: ./.github/actions/restore-mtime

      - uses: ./.github/actions/setup-rust
      - uses: ./.github/actions/cache-rust-deps/restore
      - uses: ./.github/actions/cache-rust-target/restore
        with:
          bucket: workspace-dev

      - name: Cargo doc
        run: |
          chmod +x ./.github/scripts/cargo-doc.sh
          ./.github/scripts/cargo-doc.sh
        shell: bash

      - uses: ./.github/actions/cache-rust-deps/save
        if: always()
      - uses: ./.github/actions/cache-rust-target/save
        if: always()
        with:
          bucket: workspace-dev

  build-and-lint:
    name: Build and lint
    runs-on: ubuntu-24.04
    needs: check-edr-safety
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node

      - name: Install package
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Run build script
        run: pnpm run build:dev
      - name: Run lint script
        run: pnpm run lint

  edr-napi-typings-file:
    name: Check that edr_napi typings file is up to date
    runs-on: ubuntu-24.04
    needs: check-edr-safety
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node

      - name: Install package
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build edr_napi
        run: cd crates/edr_napi && pnpm build:typingFile

      - name: Check that there are no uncommitted changes
        run: git diff --exit-code
  edr-integration-tests:
    name: Run integration tests
    runs-on: ubuntu-24.04
    needs: check-edr-safety
    env:
      RUSTFLAGS: -Dwarnings
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          persist-credentials: false
          fetch-depth: 0 # full history needed by ./.github/actions/restore-mtime
      - uses: ./.github/actions/restore-mtime

      - uses: ./.github/actions/setup-node

      - uses: ./.github/actions/setup-rust
        with:
          components: llvm-tools-preview
      - uses: ./.github/actions/cache-rust-deps/restore
      - uses: ./.github/actions/cache-rust-target/restore
        with:
          bucket: napi-coverage

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@8cd2ac21dc357ca7dd807fe294d11e9ef84f60ec # v2.62.53
        with:
          tool: cargo-llvm-cov@0.8.5

      - name: Install package
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Run integration tests
        shell: bash
        run: |
          source <(cargo llvm-cov show-env --sh)
          # See note in test-edr-ts above: force napi rebuild so index.js /
          # index.d.ts regenerate with the build:dev feature set.
          cargo clean -p edr_napi
          pnpm run --recursive --filter './js/integration-tests/*' test
          # `--release` included to match `build:dev` compilation flags
          cargo llvm-cov report --release --locked --codecov --output-path codecov.json
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@5a1091511ad55cbe89839c7260b706298ca349f7 # v5.5.1
        with:
          files: codecov.json
          name: ubuntu-24.04
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - uses: ./.github/actions/cache-rust-deps/save
        if: always()
      - uses: ./.github/actions/cache-rust-target/save
        if: always()
        with:
          bucket: napi-coverage

  cooldown-check:
    name: cooldown check
    runs-on: ubuntu-24.04
    needs: check-edr
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust

      - name: Cache cooldown data
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            **/edr-cache/cargo-cooldown-check
          key: cooldown-check-v1-${{ hashFiles('**/Cargo.lock') }}

      - uses: NomicFoundation/cargo-cooldown-check@ac40e701f9f1155741a761ac9039987fb892af4b
