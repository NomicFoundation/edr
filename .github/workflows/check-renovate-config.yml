# Validates renovate.json on every PR — schema check plus a full
# extraction dry-run so malformed rules and silent matchPackageNames
# vs matchDepNames mismatches are caught before merge.

name: Check Renovate config

on:
  pull_request:
    branches:
      - main
    paths:
      - renovate.json
      - .github/workflows/check-renovate-config.yml
  merge_group:
    types: [checks_requested]

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

jobs:
  check-renovate-config:
    name: Check Renovate config
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          # Need history reachable from both base_sha and head_sha for the
          # merge_group diff below; default fetch-depth: 1 only has HEAD.
          fetch-depth: 0

      # GHA's native `paths:` filter only applies to pull_request/push, not
      # merge_group. Mirror it here so unrelated PRs don't run the dry-run
      # when they hit the merge queue.
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        if: github.event_name == 'merge_group'
        id: filter
        with:
          base: ${{ github.event.merge_group.base_sha }}
          ref: ${{ github.event.merge_group.head_sha }}
          filters: |
            renovate:
              - renovate.json
              - .github/workflows/check-renovate-config.yml

      # ubuntu-24.04's default Node 20 is too old for renovate@latest, so
      # npx would otherwise pull a stale renovate whose schema lags the bot's.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: github.event_name != 'merge_group' || steps.filter.outputs.renovate == 'true'
        with:
          node-version: 24

      - name: Renovate schema check
        if: github.event_name != 'merge_group' || steps.filter.outputs.renovate == 'true'
        run: npx --yes --package renovate -- renovate-config-validator renovate.json

      - name: Renovate extraction dry-run
        if: github.event_name != 'merge_group' || steps.filter.outputs.renovate == 'true'
        env:
          # Without a token, github-tags/github-releases lookups hit the
          # anonymous 60 req/hr rate limit shared across the runner IP.
          GITHUB_COM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOG_LEVEL: debug
        run: npx --yes renovate --platform=local --dry-run=full
